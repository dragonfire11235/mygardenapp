# Baut die PWA und veröffentlicht sie auf GitHub Pages.
# Voraussetzung: Repo-Einstellungen → Pages → Source: "GitHub Actions"
# (macht der configure-pages-Schritt beim ersten Lauf automatisch).
name: Deploy zu GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pages konfigurieren (aktiviert Pages beim ersten Lauf)
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      # base_path kommt von configure-pages (z. B. /mygardenapp) — so stimmt
      # der Pfad auch nach einer Repo-Umbenennung.
      - name: Build
        run: npm run build -- --base=${{ steps.pages.outputs.base_path }}/
        env:
          # Supabase-Zugang für den Client-Build. Als Repo-Secrets hinterlegen:
          # Settings → Secrets and variables → Actions. Der Publishable/Anon-Key
          # ist client-öffentlich (RLS schützt die Daten) — kein echtes Geheimnis.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Gardena Application Key (client_id) — öffentlich-unkritisch, aber via Secret gepflegt.
          VITE_GARDENA_CLIENT_ID: ${{ secrets.VITE_GARDENA_CLIENT_ID }}

      # SPA-Fallback: GitHub Pages kennt die Client-Routen nicht;
      # 404.html liefert die App aus, der Router übernimmt dann.
      - name: SPA-Fallback (404.html)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
